<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IVY Teams</title>
<style>html,body{margin:0;background:#fafafa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#666}</style>
</head>
<body>
<script>
(function() {
  // Pick mobile.html or pc.html based on UA + viewport. Replace (not push)
  // so the back button skips this stub. Forward query string + hash.
  var ua = navigator.userAgent || "";
  var isMobile = /Mobile|iPhone|iPod|iPad|Android|MicroMessenger|MiniProgram/i.test(ua) || window.innerWidth <= 768;
  var target = (isMobile ? "mobile.html" : "pc.html") + (location.search || "") + (location.hash || "");
  location.replace(target);
})();
</script>
</body>
</html>
